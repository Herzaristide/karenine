# Configuration SonarQube Cloud. organization + projectKey doivent correspondre
# à ce qui est affiché dans SonarCloud (Administration → Update Key). Par défaut,
# à l'import d'un dépôt GitHub, l'organisation = le login en minuscules et la clé
# de projet = "<login>_<repo>". Ajuste si besoin.
sonar.organization=herzaristide
sonar.projectKey=Herzaristide_karenine
sonar.projectName=karenine

# Analyse l'ensemble du dépôt…
sonar.sources=.
sonar.sourceEncoding=UTF-8

# …en excluant le généré, le vendored et les binaires (rien à auditer) :
#   - docs/ : site statique (node_modules + build)
#   - anna/target : artefacts de compilation Rust
#   - assets : images/polices
#   - lockfiles
sonar.exclusions=docs/node_modules/**,docs/dist/**,anna/target/**,assets/**,flake.lock,**/package-lock.json
