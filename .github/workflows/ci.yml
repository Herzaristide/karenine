name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck et python3 sont préinstallés sur les runners ubuntu-latest.
      # --severity=warning : les notes « info » (ex. SC2015 sur `A && B || true`,
      # un idiome volontaire ici) sont advisory et ne cassent pas la CI ;
      # les vrais problèmes (warning/error) échouent toujours.
      - name: Shellcheck (scripts bash)
        run: git ls-files -z '*.sh' | xargs -0 --no-run-if-empty shellcheck --severity=warning

      - name: Syntaxe Python
        run: git ls-files -z '*.py' | xargs -0 --no-run-if-empty python3 -m py_compile

  flake:
    name: Build flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Valide que le layout ~/.config/quickshell s'assemble correctement.
      - name: nix flake check
        run: nix flake check --print-build-logs
