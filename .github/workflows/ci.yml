name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anna:
    name: Build anna (daemon)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cpal's ALSA backend needs the ALSA dev headers + pkg-config to build.
      - name: Install audio build deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: anna

      - name: Build + test
        working-directory: anna
        run: cargo build --locked && cargo test --locked

  flake:
    name: Build flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Valide que le layout ~/.config/quickshell s'assemble correctement.
      - name: nix flake check
        run: nix flake check --print-build-logs
